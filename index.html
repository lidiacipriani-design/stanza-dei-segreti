<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Stanza dei Segreti</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:    #F5C842;
    --gold2:   #E8A020;
    --purple:  #3B1F6E;
    --purple2: #5A3490;
    --teal:    #1A8C7A;
    --coral:   #D94F3D;
    --cream:   #FDF6E3;
    --ink:     #1C1228;
    --star:    #FFE680;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: var(--ink);
    color: var(--cream);
    cursor: default;
  }

  /* ── SFONDO STELLATO ── */
  #sky {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 60% 30%, #2d1454 0%, #1C1228 55%, #0a0810 100%);
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: var(--star);
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.15; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.4); }
  }

  /* nebula glow */
  #sky::before {
    content: '';
    position: absolute;
    width: 600px; height: 300px;
    top: 5%; left: 20%;
    background: radial-gradient(ellipse, rgba(90,52,144,0.35) 0%, transparent 70%);
    border-radius: 50%;
  }
  #sky::after {
    content: '';
    position: absolute;
    width: 400px; height: 200px;
    bottom: 20%; right: 10%;
    background: radial-gradient(ellipse, rgba(26,140,122,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* ── CONTAINER PRINCIPALE ── */
  #app {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 20px;
  }

  /* ── CORNICE PORTA MAGICA ── */
  #door-frame {
    position: relative;
    width: min(580px, 96vw);
    background: linear-gradient(160deg, #2a1550 0%, #1a0e3a 60%, #0f0820 100%);
    border: 3px solid var(--gold2);
    border-radius: 18px;
    padding: 40px 44px 36px;
    box-shadow:
      0 0 0 6px rgba(245,200,66,0.08),
      0 0 40px rgba(245,200,66,0.18),
      0 0 80px rgba(59,31,110,0.6),
      inset 0 1px 0 rgba(245,200,66,0.3);
    text-align: center;
  }

  /* angoli decorativi */
  #door-frame::before, #door-frame::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 22px;
    opacity: 0.7;
  }
  #door-frame::before { top: 12px; left: 18px; }
  #door-frame::after  { top: 12px; right: 18px; }
  .corner-br, .corner-bl {
    position: absolute;
    color: var(--gold);
    font-size: 22px;
    opacity: 0.7;
  }
  .corner-bl { bottom: 12px; left: 18px; }
  .corner-br { bottom: 12px; right: 18px; }

  /* ── TITOLO ── */
  .eyebrow {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold2);
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.3s;
  }

  h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(26px, 5vw, 42px);
    color: var(--gold);
    line-height: 1.15;
    text-shadow: 0 0 30px rgba(245,200,66,0.5), 0 2px 4px rgba(0,0,0,0.6);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.5s;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: rgba(253,246,227,0.65);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }

  /* ── TRE STANZE — PILLOLE ── */
  .rooms-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
  }
  .room-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid;
    letter-spacing: 0.3px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .room-pill:hover { transform: translateY(-2px); }
  .pill-purple {
    background: rgba(90,52,144,0.25);
    border-color: rgba(90,52,144,0.8);
    color: #c9a8ff;
    box-shadow: 0 0 12px rgba(90,52,144,0.3);
  }
  .pill-teal {
    background: rgba(26,140,122,0.2);
    border-color: rgba(26,140,122,0.7);
    color: #7de8d8;
    box-shadow: 0 0 12px rgba(26,140,122,0.25);
  }
  .pill-coral {
    background: rgba(217,79,61,0.2);
    border-color: rgba(217,79,61,0.7);
    color: #ffaa9a;
    box-shadow: 0 0 12px rgba(217,79,61,0.25);
  }

  /* ── DIVISORE ── */
  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold2), transparent);
    margin: 0 auto 24px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.0s;
  }

  /* ── SELEZIONE SQUADRE ── */
  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold2);
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.1s;
  }

  .teams-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 1.2s;
  }
  .team-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(245,200,66,0.3);
    background: rgba(245,200,66,0.06);
    color: var(--cream);
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .team-btn:hover {
    border-color: var(--gold);
    background: rgba(245,200,66,0.15);
    transform: scale(1.1);
    box-shadow: 0 0 16px rgba(245,200,66,0.3);
  }
  .team-btn.selected {
    border-color: var(--gold);
    background: rgba(245,200,66,0.22);
    box-shadow: 0 0 20px rgba(245,200,66,0.4);
    color: var(--gold);
  }
  .team-btn.selected::after {
    content: '✓';
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: var(--gold);
    color: var(--ink);
    border-radius: 50%;
    font-size: 10px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 18px;
  }

  /* ── NOMI SQUADRE ── */
  .team-names {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
    min-height: 44px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.3s;
  }
  .team-input {
    width: 120px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(245,200,66,0.25);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .team-input::placeholder { color: rgba(253,246,227,0.3); }
  .team-input:focus {
    border-color: var(--gold2);
    box-shadow: 0 0 10px rgba(245,200,66,0.2);
  }

  /* ── BOTTONE INIZIA ── */
  #start-btn {
    position: relative;
    padding: 14px 48px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: var(--ink);
    font-family: 'Cinzel Decorative', cursive;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 24px rgba(245,200,66,0.4), 0 0 0 0 rgba(245,200,66,0.3);
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 1.5s;
    overflow: hidden;
  }
  #start-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
    border-radius: inherit;
  }
  #start-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 32px rgba(245,200,66,0.55), 0 0 0 4px rgba(245,200,66,0.15);
  }
  #start-btn:active { transform: translateY(-1px) scale(1.01); }
  #start-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── NOTA INSEGNANTE ── */
  .teacher-note {
    margin-top: 18px;
    font-size: 11px;
    color: rgba(253,246,227,0.35);
    font-weight: 600;
    letter-spacing: 0.3px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.7s;
  }
  .teacher-note span { color: rgba(245,200,66,0.5); }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SCHERMATA CARICAMENTO STANZE ── */
  #loading-screen {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: var(--ink);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #loading-screen.visible { display: flex; }
  .loading-icon {
    font-size: 60px;
    animation: spin 1.5s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .loading-text {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 18px;
    color: var(--gold);
    text-align: center;
  }
  .loading-sub {
    font-size: 13px;
    color: rgba(253,246,227,0.5);
    text-align: center;
  }
</style>
</head>
<body>

<!-- SFONDO STELLATO -->
<div id="sky"></div>

<!-- APP -->
<div id="app">
  <div id="door-frame">
    <span class="corner-bl">✦</span>
    <span class="corner-br">✦</span>

    <div class="eyebrow">Avventura didattica</div>
    <h1>La Stanza<br>dei Segreti</h1>
    <div class="subtitle">Tre stanze · Nove indizi · Un enigma finale</div>

    <div class="rooms-row">
      <div class="room-pill pill-purple">🔮 Torre della Visione</div>
      <div class="room-pill pill-teal">🔍 Sala degli Indizi</div>
      <div class="room-pill pill-coral">🧠 Cripta della Memoria</div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Quante squadre giocano?</div>
    <div class="teams-row" id="teams-row">
      <button class="team-btn" data-n="2" onclick="selectTeams(2)">2</button>
      <button class="team-btn" data-n="3" onclick="selectTeams(3)">3</button>
    </div>

    <div class="team-names" id="team-names"></div>

    <button id="start-btn" disabled onclick="startGame()">
      ✦ Inizia l'Avventura ✦
    </button>

    <div class="teacher-note">
      🔑 <span>Consiglio:</span> dai un nome a ogni squadra per rendere la sfida più emozionante
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-icon">🔮</div>
  <div class="loading-text">Le porte si stanno aprendo…</div>
  <div class="loading-sub" id="loading-sub"></div>
</div>

<script>
// ── STELLE ──
const sky = document.getElementById('sky');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.8;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%;
    left:${Math.random()*100}%;
    --dur:${2 + Math.random()*4}s;
    --delay:-${Math.random()*6}s;
  `;
  sky.appendChild(s);
}

// ── STATO GIOCO ──
let numTeams = 0;
const defaultNames = ['🦁 Leoni', '🦊 Volpi', '🦅 Aquile', '🐉 Draghi'];

function selectTeams(n) {
  numTeams = n;
  document.querySelectorAll('.team-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.n) === n);
  });
  renderInputs(n);
  updateStartBtn();
}

function renderInputs(n) {
  const container = document.getElementById('team-names');
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const inp = document.createElement('input');
    inp.className = 'team-input';
    inp.placeholder = defaultNames[i];
    inp.maxLength = 14;
    inp.dataset.index = i;
    inp.addEventListener('input', updateStartBtn);
    container.appendChild(inp);
  }
  updateStartBtn();
}

function getTeamNames() {
  return Array.from(document.querySelectorAll('.team-input'))
    .map((inp, i) => inp.value.trim() || defaultNames[i]);
}

function updateStartBtn() {
  const btn = document.getElementById('start-btn');
  btn.disabled = numTeams === 0;
}

function startGame() {
  const names = getTeamNames();
  const loadingScreen = document.getElementById('loading-screen');
  const sub = document.getElementById('loading-sub');
  sub.textContent = names.join(' · ') + ' — siete pronti?';
  loadingScreen.classList.add('visible');

  // Salva dati in sessionStorage per le prossime pagine
  sessionStorage.setItem('teams', JSON.stringify(names));
  sessionStorage.setItem('scores', JSON.stringify(new Array(names.length).fill(0)));

  // Simula caricamento, poi va alla mappa delle stanze
  setTimeout(() => {
    window.location.href = 'map.html';
  }, 2200);
}
</script>
</body>
</html>
