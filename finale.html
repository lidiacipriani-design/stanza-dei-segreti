<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enigma Finale</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--gold:#F5C842;--gold2:#E8A020;--cream:#FDF6E3;--ink:#1C1228;}
  html,body{width:100%;min-height:100%;font-family:'Nunito',sans-serif;background:var(--ink);color:var(--cream);}
  #sky{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 30%,#2d1454 0%,#1C1228 50%,#0a0810 100%);overflow:hidden;}
  .star{position:absolute;background:#FFE680;border-radius:50%;animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
  #app{position:relative;z-index:10;max-width:680px;margin:0 auto;padding:20px 20px 48px;display:flex;flex-direction:column;gap:20px;min-height:100vh;}

  /* HEADER */
  .finale-header{text-align:center;padding:24px 20px 16px;}
  .finale-eyebrow{font-size:10px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--gold2);margin-bottom:10px;}
  .finale-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(22px,5vw,34px);color:var(--gold);text-shadow:0 0 30px rgba(245,200,66,.4);line-height:1.2;margin-bottom:8px;}
  .finale-sub{font-size:14px;color:rgba(253,246,227,.6);font-weight:600;line-height:1.5;}

  /* PUNTEGGI */
  .scores-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .score-card{flex:1;min-width:100px;max-width:200px;background:rgba(245,200,66,.06);border:1.5px solid rgba(245,200,66,.2);border-radius:14px;padding:10px 12px;text-align:center;}
  .score-name{font-size:13px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .score-pts{font-family:'Cinzel Decorative',cursive;font-size:24px;color:var(--gold);line-height:1;}
  .score-lbl{font-size:9px;color:rgba(253,246,227,.4);font-weight:700;letter-spacing:1px;text-transform:uppercase;}

  /* INDIZI */
  .clues-section{background:rgba(255,255,255,.03);border:1.5px solid rgba(245,200,66,.15);border-radius:18px;padding:20px;}
  .clues-title{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);margin-bottom:14px;text-align:center;}
  .clues-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .clue-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(245,200,66,.08);border:1.5px solid rgba(245,200,66,.25);border-radius:30px;animation:chipIn .4s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes chipIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .clue-chip-icon{font-size:20px;}
  .clue-chip-info{display:flex;flex-direction:column;}
  .clue-chip-team{font-size:10px;font-weight:800;color:var(--gold2);letter-spacing:.5px;}
  .clue-chip-room{font-size:11px;font-weight:700;color:rgba(253,246,227,.6);}

  /* ENIGMA BOX */
  .enigma-box{background:linear-gradient(145deg,#2a1550 0%,#1a0e3a 100%);border:2px solid rgba(245,200,66,.3);border-radius:20px;padding:24px 20px;text-align:center;}
  .enigma-icon{font-size:56px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(245,200,66,.3));}
  .enigma-title{font-family:'Cinzel Decorative',cursive;font-size:17px;color:var(--gold);margin-bottom:10px;}
  .enigma-desc{font-size:14px;color:rgba(253,246,227,.7);line-height:1.6;margin-bottom:20px;}

  /* INDIZI TESTUALI */
  .text-clues{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;text-align:left;}
  .text-clue{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;}
  .text-clue-num{width:24px;height:24px;border-radius:50%;background:rgba(245,200,66,.15);border:1.5px solid rgba(245,200,66,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--gold);flex-shrink:0;}
  .text-clue-text{font-size:14px;font-weight:700;color:var(--cream);line-height:1.5;}

  /* INDIZI VISIVI */
  .visual-clues{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .visual-clue{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 18px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;min-width:80px;}
  .visual-clue-emoji{font-size:36px;}
  .visual-clue-label{font-size:11px;font-weight:700;color:rgba(253,246,227,.6);text-align:center;}

  /* RISPOSTA */
  .answer-section{display:flex;flex-direction:column;gap:10px;}
  .answer-label{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);text-align:center;}
  .answer-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .answer-opt{padding:14px 16px;background:rgba(245,200,66,.06);border:2px solid rgba(245,200,66,.2);border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;transition:all .25s;text-align:center;color:var(--cream);display:flex;align-items:center;justify-content:center;gap:8px;}
  .answer-opt:hover:not(.correct):not(.wrong){border-color:var(--gold);background:rgba(245,200,66,.15);transform:scale(1.02);}
  .answer-opt.correct{background:rgba(26,140,122,.25);border-color:#1A8C7A;color:#7de8d8;}
  .answer-opt.wrong{background:rgba(217,79,61,.1);border-color:rgba(217,79,61,.3);color:rgba(253,246,227,.3);}

  /* VITTORIA */
  .victory-screen{display:none;flex-direction:column;gap:20px;text-align:center;animation:fadeUp .6s ease;}
  .victory-screen.visible{display:flex;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .victory-icon{font-size:80px;animation:bounceIn .8s cubic-bezier(.34,1.56,.64,1);}
  @keyframes bounceIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .victory-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(22px,5vw,32px);color:var(--gold);text-shadow:0 0 30px rgba(245,200,66,.5);}
  .victory-answer{font-size:clamp(28px,6vw,42px);font-weight:800;color:var(--cream);margin:4px 0;}
  .victory-sub{font-size:15px;color:rgba(253,246,227,.6);line-height:1.6;}

  .podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin:8px 0;}
  .podium-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .podium-bar{width:80px;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel Decorative',cursive;font-size:18px;color:var(--ink);font-weight:700;transition:height .8s ease;}
  .podium-name{font-size:12px;font-weight:800;color:var(--cream);text-align:center;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .podium-pts{font-size:11px;color:var(--gold2);font-weight:700;}

  .confetti-area{position:fixed;inset:0;pointer-events:none;z-index:200;}
  .confetto{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall var(--dur,3s) ease-in var(--delay,0s) both;}
  @keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}

  .btn-primary{padding:14px 36px;background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:var(--ink);font-family:'Cinzel Decorative',cursive;font-size:14px;font-weight:700;border:none;border-radius:50px;cursor:pointer;transition:all .25s;box-shadow:0 4px 24px rgba(245,200,66,.4);width:100%;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(245,200,66,.55);}
  .btn-secondary{padding:12px 24px;background:transparent;color:rgba(253,246,227,.5);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;border:1.5px solid rgba(253,246,227,.15);border-radius:50px;cursor:pointer;transition:all .2s;width:100%;}
  .btn-secondary:hover{border-color:rgba(253,246,227,.4);color:var(--cream);}
</style>
</head>
<body>
<div id="sky"></div>
<div class="confetti-area" id="confetti"></div>
<div id="app">

  <div class="finale-header">
    <div class="finale-eyebrow">⭐ Enigma Finale ⭐</div>
    <div class="finale-title">Chi è il Personaggio<br>Misterioso?</div>
    <div class="finale-sub">Usate tutti gli indizi raccolti<br>per scoprire la risposta!</div>
  </div>

  <div class="scores-row" id="scores-row"></div>

  <div class="clues-section">
    <div class="clues-title">🧩 Indizi raccolti dalle squadre</div>
    <div class="clues-grid" id="clues-grid"></div>
  </div>

  <!-- ENIGMA -->
  <div class="enigma-box" id="enigma-box">
    <div class="enigma-icon">🔮</div>
    <div class="enigma-title">Leggete gli indizi insieme</div>
    <div class="enigma-desc">Discutete in classe — poi scegliete la risposta!</div>

    <div class="text-clues" id="text-clues"></div>
    <div class="visual-clues" id="visual-clues"></div>

    <div class="answer-section">
      <div class="answer-label">Chi è?</div>
      <div class="answer-options" id="answer-options"></div>
    </div>
  </div>

  <!-- VITTORIA -->
  <div class="victory-screen" id="victory-screen">
    <div class="victory-icon" id="victory-icon">🎉</div>
    <div class="victory-title">Avete risolto l'enigma!</div>
    <div class="victory-answer" id="victory-answer"></div>
    <div class="victory-sub" id="victory-sub"></div>
    <div class="podium" id="podium"></div>
    <button class="btn-primary" onclick="newGame()">🎲 Nuova partita</button>
    <button class="btn-secondary" onclick="window.location.href='index.html'">← Torna all'inizio</button>
  </div>

</div>
<script>
// STELLE
const sky=document.getElementById('sky');
for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+.8;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:-${Math.random()*6}s;`;sky.appendChild(s);}

// STATO
const teams  = JSON.parse(sessionStorage.getItem('teams')||'["Squadra 1","Squadra 2"]');
const scores = JSON.parse(sessionStorage.getItem('scores')||'[0,0]');
const clues  = JSON.parse(sessionStorage.getItem('clues')||'[]');

// ENIGMI
const enigmi = [
  {
    persona:'🧺 Cappuccetto Rosso',
    risposta:'Cappuccetto Rosso',
    testuali:[
      'Va nel bosco da sola a trovare qualcuno',
      'Porta da mangiare a un familiare',
      'Ha incontrato un animale furbo e pericoloso'
    ],
    visivi:[
      {emoji:'🧺',label:'Cestino con cibo'},
      {emoji:'🐺',label:'Lupo cattivo'},
      {emoji:'🔴',label:'Mantello rosso'}
    ],
    opzioni:['🧺 Cappuccetto Rosso','👸 Cenerentola','🧙‍♀️ Strega del bosco','🌹 La Bella Addormentata'],
    correct:0
  },
  {
    persona:'👨‍⚕️ Il Medico',
    risposta:'Il Medico',
    testuali:[
      'Lavora in un posto dove vanno le persone che stanno male',
      'Studia tantissimi anni per imparare il suo lavoro',
      'Aiuta le persone a guarire e a stare meglio'
    ],
    visivi:[
      {emoji:'💉',label:'Siringa'},
      {emoji:'🩺',label:'Stetoscopio'},
      {emoji:'🩹',label:'Cerotto'}
    ],
    opzioni:['👮 Poliziotto','👨‍⚕️ Medico','👨‍🏫 Insegnante','👨‍🍳 Cuoco'],
    correct:1
  },
  {
    persona:'🎅 Babbo Natale',
    risposta:'Babbo Natale',
    testuali:[
      'Arriva di notte quando tutti dormono',
      'Conosce il nome di tutti i bambini del mondo',
      'Ha una slitta speciale che vola nel cielo'
    ],
    visivi:[
      {emoji:'🎁',label:'Pacco regalo'},
      {emoji:'🦌',label:'Renna volante'},
      {emoji:'🔔',label:'Campanella'}
    ],
    opzioni:['🧙 Mago','🎅 Babbo Natale','👼 Angelo','🌟 Stella cometa'],
    correct:1
  },
  {
    persona:'📬 Il Postino',
    risposta:'Il Postino',
    testuali:[
      'Gira per le strade ogni mattina con qualcosa da consegnare',
      'Conosce tutti gli indirizzi del quartiere',
      'Lavora con qualsiasi tempo, pioggia o sole'
    ],
    visivi:[
      {emoji:'✉️',label:'Busta'},
      {emoji:'📬',label:'Cassetta della posta'},
      {emoji:'🚲',label:'Bicicletta'}
    ],
    opzioni:['🚚 Camionista','📬 Postino','👮 Vigile','🛒 Negoziante'],
    correct:1
  },
  {
    persona:'🚒 Il Pompiere',
    risposta:'Il Pompiere',
    testuali:[
      'Lavora anche di notte e nei giorni di festa',
      'Parte di corsa quando sente suonare la sirena',
      'A volte salva anche gli animali in pericolo'
    ],
    visivi:[
      {emoji:'🪜',label:'Scala lunga'},
      {emoji:'🚒',label:'Camion rosso'},
      {emoji:'💧',label:'Idrante'}
    ],
    opzioni:['👮 Poliziotto','🚑 Medico del 118','🚒 Pompiere','🏗️ Operaio edile'],
    correct:2
  },
  {
    persona:'🌾 Il Contadino',
    risposta:'Il Contadino',
    testuali:[
      'Si sveglia all\'alba quando è ancora buio',
      'Il suo lavoro cambia completamente con le stagioni',
      'Senza di lui non avremmo niente da mangiare'
    ],
    visivi:[
      {emoji:'🌾',label:'Grano maturo'},
      {emoji:'🚜',label:'Trattore'},
      {emoji:'🌱',label:'Semino in terra'}
    ],
    opzioni:['🌾 Contadino','🍳 Cuoco','🏪 Negoziante','🌿 Fiorista'],
    correct:0
  }
];

// Scegli enigma casuale
const enigma = enigmi[Math.floor(Math.random()*enigmi.length)];

// RENDER PUNTEGGI
function renderScores(){
  const row=document.getElementById('scores-row');
  teams.forEach((name,i)=>{
    const card=document.createElement('div');card.className='score-card';
    card.innerHTML=`<div class="score-name">${name}</div><div class="score-pts">${scores[i]}</div><div class="score-lbl">punti</div>`;
    row.appendChild(card);
  });
}

// RENDER INDIZI RACCOLTI
function renderClues(){
  const grid=document.getElementById('clues-grid');
  clues.forEach((c,i)=>{
    const chip=document.createElement('div');
    chip.className='clue-chip';
    chip.style.animationDelay=(i*0.1)+'s';
    chip.innerHTML=`<div class="clue-chip-icon">${c.icon}</div><div class="clue-chip-info"><div class="clue-chip-team">${c.teamName}</div><div class="clue-chip-room">${c.roomName}</div></div>`;
    grid.appendChild(chip);
  });
}

// RENDER ENIGMA
function renderEnigma(){
  // indizi testuali
  const tc=document.getElementById('text-clues');
  enigma.testuali.forEach((t,i)=>{
    const div=document.createElement('div');div.className='text-clue';
    div.innerHTML=`<div class="text-clue-num">${i+1}</div><div class="text-clue-text">${t}</div>`;
    tc.appendChild(div);
  });
  // indizi visivi
  const vc=document.getElementById('visual-clues');
  enigma.visivi.forEach(v=>{
    const div=document.createElement('div');div.className='visual-clue';
    div.innerHTML=`<div class="visual-clue-emoji">${v.emoji}</div><div class="visual-clue-label">${v.label}</div>`;
    vc.appendChild(div);
  });
  // opzioni risposta
  const ao=document.getElementById('answer-options');
  enigma.opzioni.forEach((o,i)=>{
    const btn=document.createElement('button');btn.className='answer-opt';btn.textContent=o;
    btn.onclick=()=>checkAnswer(i);
    ao.appendChild(btn);
  });
}

function checkAnswer(idx){
  const btns=document.querySelectorAll('.answer-opt');
  btns.forEach(b=>b.onclick=null);
  if(idx===enigma.correct){
    btns[idx].classList.add('correct');
    setTimeout(()=>showVictory(true),800);
  } else {
    btns[idx].classList.add('wrong');
    btns[enigma.correct].classList.add('correct');
    setTimeout(()=>showVictory(false),1200);
  }
}

function showVictory(correct){
  document.getElementById('enigma-box').style.display='none';
  const vs=document.getElementById('victory-screen');
  vs.classList.add('visible');
  document.getElementById('victory-icon').textContent = correct ? '🎉' : '🔮';
  document.getElementById('victory-answer').textContent = enigma.risposta;
  document.getElementById('victory-sub').textContent = correct
    ? 'Avete letto tutti gli indizi e trovato la risposta giusta! Siete dei veri detective!'
    : 'La risposta era '+enigma.risposta+'. Avete lavorato bene — la prossima volta ci riuscirete!';
  renderPodium();
  if(correct) launchConfetti();
}

function renderPodium(){
  const sorted=[...teams.map((n,i)=>({name:n,pts:scores[i]}))].sort((a,b)=>b.pts-a.pts);
  const maxPts=sorted[0].pts||1;
  const colors=['#F5C842','#C0C0C0','#CD7F32'];
  const podium=document.getElementById('podium');
  sorted.forEach((t,i)=>{
    const h=Math.max(40, Math.round((t.pts/maxPts)*120));
    const col=document.createElement('div');col.className='podium-col';
    col.innerHTML=`
      <div class="podium-pts">${t.pts} pt</div>
      <div class="podium-bar" style="height:${h}px;background:${colors[i]||'#666'}">${i===0?'🥇':i===1?'🥈':'🥉'}</div>
      <div class="podium-name">${t.name}</div>`;
    podium.appendChild(col);
  });
}

function launchConfetti(){
  const colors=['#F5C842','#a78bfa','#7de8d8','#ffaa9a','#fff','#E8A020'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='confetto';
    c.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};--dur:${2+Math.random()*3}s;--delay:${Math.random()*2}s;transform:rotate(${Math.random()*360}deg);`;
    document.getElementById('confetti').appendChild(c);
  }
  setTimeout(()=>document.getElementById('confetti').innerHTML='',6000);
}

function newGame(){
  // Resetta tutto tranne i nomi squadre
  sessionStorage.setItem('scores', JSON.stringify(new Array(teams.length).fill(0)));
  sessionStorage.setItem('completedBy', '[[],[],[]]');
  sessionStorage.setItem('clues', '[]');
  sessionStorage.setItem('currentTeam', '0');
  window.location.href='map.html';
}

// INIT
renderScores();
renderClues();
renderEnigma();
</script>
</body>
</html>
